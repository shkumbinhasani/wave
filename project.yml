name: wave
options:
  bundleIdPrefix: com.wave
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    version: 2.9.0

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  wave:
    type: application
    platform: macOS
    sources:
      - path: tgip
        excludes:
          - "*.entitlements"
          - "Resources/**"
    preBuildScripts:
      - name: Copy Resources
        script: |
          cp -R "${PROJECT_DIR}/tgip/Resources/shell-integration" "${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/"
          cp -R "${PROJECT_DIR}/tgip/Resources/terminfo" "${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/"
          cp "${PROJECT_DIR}/tgip/Resources/ghostty.config" "${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/" 2>/dev/null || true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wave.terminal
        PRODUCT_NAME: wave
        MARKETING_VERSION: "0.5.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: tgip/Info.plist
        CODE_SIGN_ENTITLEMENTS: tgip/tgip.entitlements
        CODE_SIGN_STYLE: Automatic
        FRAMEWORK_SEARCH_PATHS:
          - "$(PROJECT_DIR)/Frameworks"
          - "$(PROJECT_DIR)"
        SWIFT_OBJC_BRIDGING_HEADER: ""
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
        OTHER_LDFLAGS:
          - "-lstdc++"
          - "-framework"
          - "Metal"
          - "-framework"
          - "QuartzCore"
          - "-framework"
          - "Carbon"
      debug:
        SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG"
      release:
        SWIFT_OPTIMIZATION_LEVEL: "-O"
    dependencies:
      - framework: Frameworks/GhosttyKit.xcframework
        embed: false
      - package: Sparkle
