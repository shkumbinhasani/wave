name: wave
options:
  bundleIdPrefix: com.wave
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    version: 2.9.0

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    # ghostty ships arm64-only, so the whole app is arm64. Pin it so Release
    # builds (incl. CI, which doesn't pass an arch) never try x86_64 and fail to link.
    ARCHS: arm64

targets:
  wave:
    type: application
    platform: macOS
    sources:
      - path: tgip
        excludes:
          - "*.entitlements"
          - "Resources/**"
    preBuildScripts:
      - name: Copy Resources
        script: |
          cp -R "${PROJECT_DIR}/tgip/Resources/shell-integration" "${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/"
          cp -R "${PROJECT_DIR}/tgip/Resources/terminfo" "${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/"
          cp "${PROJECT_DIR}/tgip/Resources/ghostty.config" "${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/" 2>/dev/null || true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wave.terminal
        PRODUCT_NAME: wave
        MARKETING_VERSION: "0.8.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: tgip/Info.plist
        CODE_SIGN_ENTITLEMENTS: tgip/tgip.entitlements
        CODE_SIGN_STYLE: Automatic
        FRAMEWORK_SEARCH_PATHS:
          - "$(PROJECT_DIR)/Frameworks"
          - "$(PROJECT_DIR)"
        SWIFT_OBJC_BRIDGING_HEADER: ""
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
        OTHER_LDFLAGS:
          - "-lstdc++"
          - "-framework"
          - "Metal"
          - "-framework"
          - "QuartzCore"
          - "-framework"
          - "Carbon"
      debug:
        SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG"
      release:
        SWIFT_OPTIMIZATION_LEVEL: "-O"
    dependencies:
      - framework: Frameworks/GhosttyKit.xcframework
        embed: false
      - package: Sparkle
    scheme:
      testTargets:
        - waveTests

  waveTests:
    type: bundle.unit-test
    platform: macOS
    # Logic-test bundle: compiles the pure sources under test directly, with no
    # host app, so the suite never launches the terminal. Only files free of
    # AppKit/libghostty/Process side effects belong here.
    sources:
      - path: tgipTests
      - path: tgip/Git/GitDiffModel.swift
      - path: tgip/Git/GitDiffComposer.swift
      - path: tgip/GitSupport.swift
      - path: tgip/Theme/ThemeStore.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wave.tests
        GENERATE_INFOPLIST_FILE: YES
