name: Update Homebrew Cask

on:
  release:
    types: [published]

jobs:
  update-cask:
    runs-on: ubuntu-latest
    steps:
      - name: Update cask formula
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          ZIP_URL="https://github.com/shkumbinhasani/wave/releases/download/${GITHUB_REF_NAME}/wave-macos-arm64.zip"
          SHA256=$(curl -sL "$ZIP_URL" | shasum -a 256 | awk '{print $1}')

          # Clone the tap, update the cask, push
          git clone https://x-access-token:${GH_TOKEN}@github.com/shkumbinhasani/homebrew-tap.git /tmp/tap
          cd /tmp/tap

          cat > Casks/wave.rb << EOF
          cask "wave" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/shkumbinhasani/wave/releases/download/v#{version}/wave-macos-arm64.zip"
            name "Wave Terminal"
            desc "macOS terminal emulator built with SwiftUI and libghostty"
            homepage "https://github.com/shkumbinhasani/wave"

            depends_on macos: ">= :sonoma"

            app "wave.app"

            zap trash: [
              "~/Library/Preferences/com.wave.terminal.plist",
              "~/Library/Caches/com.wave.terminal",
            ]
          end
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update wave to ${VERSION}" || exit 0
          git push
