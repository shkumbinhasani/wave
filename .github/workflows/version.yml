name: Version

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for pending changesets
        id: check
        run: |
          COUNT=$(find .changeset -name "*.md" ! -name "README.md" | wc -l)
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Log status
        run: echo "${{ steps.check.outputs.count }} changeset(s) pending"
