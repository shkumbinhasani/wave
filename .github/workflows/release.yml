name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Cache GhosttyKit
        id: cache-ghostty
        uses: actions/cache@v4
        with:
          path: Frameworks/GhosttyKit.xcframework
          key: ghosttykit-${{ runner.os }}-${{ hashFiles('.ghostty-version') }}
          restore-keys: ghosttykit-${{ runner.os }}-

      - name: Build GhosttyKit
        if: steps.cache-ghostty.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/ghostty-org/ghostty.git /tmp/ghostty
          cd /tmp/ghostty
          zig build -Demit-xcframework -Dxcframework-target=native --release=fast || true
          test -d /tmp/ghostty/macos/GhosttyKit.xcframework
          mkdir -p $GITHUB_WORKSPACE/Frameworks
          cp -R /tmp/ghostty/macos/GhosttyKit.xcframework $GITHUB_WORKSPACE/Frameworks/

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve SPM packages
        run: |
          xcodebuild -project wave.xcodeproj \
            -scheme wave \
            -resolvePackageDependencies

      - name: Build Release
        run: |
          xcodebuild -project wave.xcodeproj \
            -scheme wave \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package
        run: |
          cd build/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent wave.app wave-macos-arm64.zip
          mv wave-macos-arm64.zip $GITHUB_WORKSPACE/

      - name: Generate Sparkle appcast
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          URL="https://github.com/shkumbinhasani/wave/releases/download/${GITHUB_REF_NAME}/wave-macos-arm64.zip"
          SIZE=$(stat -f%z wave-macos-arm64.zip)
          cat > appcast.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>Wave Terminal</title>
              <item>
                <title>Version ${VERSION}</title>
                <sparkle:version>${VERSION}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <pubDate>$(date -R)</pubDate>
                <enclosure url="${URL}" length="${SIZE}" type="application/octet-stream" sparkle:os="macos"/>
              </item>
            </channel>
          </rss>
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            wave-macos-arm64.zip
            appcast.xml
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}
